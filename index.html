<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>stankin.help — навигатор по Станкину</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">stankin.<span class="highlight">help</span></div>
            <p class="tagline">Навигатор по корпусам</p>
        </div>

        <div class="input-card">
            <div class="input-group">
                <label>📍 Откуда</label>
                <input type="text" id="from" placeholder="0205 или 205">
            </div>

            <div class="input-group">
                <label>🎯 Куда</label>
                <input type="text" id="to" placeholder="0301 или 301">
            </div>

            <button id="findBtn">Построить маршрут →</button>
        </div>

        <div id="result" class="result-card" style="display: none;">
            <h3>🗺️ Маршрут</h3>
            <div id="routeText"></div>
        </div>

        <div class="footer">
            <span>stankin.help — офлайн-навигатор</span>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(console.log);
        }
    </script>
</body>
</html>
