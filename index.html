<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stankin.help — навигатор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">stankin.<span class="highlight">help</span></div>
            <p class="tagline">Навигатор по корпусам</p>
        </div>
        
        <div class="input-card">
            <div class="input-group">
                <label>📍 Откуда</label>
                <input type="text" id="from" list="auditories-list" placeholder="0208 или ТП-8 ЛТТО ЦТМ">
            </div>
            <div class="input-group">
                <label>🎯 Куда</label>
                <input type="text" id="to" list="auditories-list" placeholder="0208 или ТП-8 ЛТТО ЦТМ">
            </div>
            <button id="findBtn">Построить маршрут →</button>
        </div>

        <div id="result" class="result-card" style="display: none;">
            <h3>🗺️ Маршрут</h3>
            <div id="mapContainer"></div>
        </div>
    </div>

    <datalist id="auditories-list"></datalist>
    <script src="script.js"></script>
</body>
</html>
